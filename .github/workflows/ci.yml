name: CI

on:
  push:
    branches: [main, "claude/*"]
  pull_request:
    branches: [main]

# Hackathon CI: builds the frontend only. Contract + CLI typecheck depend on
# the Compact toolchain + compiled artifacts which can't run on GitHub Actions
# Ubuntu runners. Local Mac dev environment validates those workspaces.

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install workspace
        run: |
          cd frontend
          npm install --no-audit --no-fund
      - name: Typecheck
        run: |
          cd frontend
          npx tsc -b --noEmit
      - name: Build
        run: |
          cd frontend
          npm run build
