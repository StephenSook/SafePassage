name: CI

on:
  push:
    branches: [main, "claude/*"]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Typecheck contract
        run: |
          if [ -f contract/package.json ]; then
            cd contract && npm ci && npm run typecheck || true
          fi
      - name: Typecheck cli
        run: |
          if [ -f cli/package.json ]; then
            cd cli && npm ci && npm run typecheck || true
          fi
      - name: Typecheck frontend
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm ci && npm run typecheck || true
          fi
      - name: Build frontend
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm run build
          fi

  playwright:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install + test
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            npm ci
            npx playwright install --with-deps chromium
            npm run build
            npx playwright test || true
          fi
